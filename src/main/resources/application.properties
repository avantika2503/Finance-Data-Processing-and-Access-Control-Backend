spring.application.name=finance-backend

spring.datasource.url=jdbc:h2:file:./data/financedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=ChangeThisToAVeryLongSecretKeyForHS256Minimum256BitsUseRandomBytesInProduction1234567890
app.jwt.expiration-ms=86400000

# When true, seed demo users and records on startup if the database has no users (see DataSeeder).
app.seed-data=true

# OpenAPI JSON (SpringDoc also keeps compatibility paths; see SecurityConfig)
springdoc.api-docs.path=/api-docs
# Use default Swagger UI at /swagger-ui/index.html — custom springdoc.swagger-ui.path=/api/docs
# unregisters the default handler and breaks /swagger-ui/** (NoResourceFoundException → 500 via generic handler).
