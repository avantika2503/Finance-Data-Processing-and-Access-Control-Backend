spring.application.name=finance-backend

# Phase 2 will switch to file-based H2 (./data/financedb). In-memory for now so the app starts with no entities.
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
